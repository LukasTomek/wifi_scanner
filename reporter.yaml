switch:
  - platform: template
    name: "Scanner Sniff Mode"
    id: scanner_sniff_switch
    optimistic: false
    turn_on_action:
      - lambda: "id(reporter).request_sniff_on();"
    turn_off_action:
      - lambda: "id(reporter).request_sniff_off();"

text_sensor:
  - platform: template
    name: "Scanner Status"
    id: scanner_status