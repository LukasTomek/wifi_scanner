switch:
  - platform: template
    name: "Scanner WiFi / OTA"
    id: scanner_wifi_switch
    optimistic: false
    turn_on_action:
      - lambda: "id(reporter).request_wifi_on();"
    turn_off_action:
      - lambda: "id(reporter).request_wifi_off();"

text_sensor:
  - platform: template
    name: "Scanner WiFi Status"
    id: scanner_wifi_status