esphome:
  name: wifi-reporter
  platform: ESP32
  board: esp32dev

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:

mqtt:
  broker: !secret mqtt_broker

uart:
  id: uart_bus
  tx_pin: GPIO16
  rx_pin: GPIO17
  baud_rate: 115200

external_components:
  - source:
      type: local
      path: components

wifi_scanner:
  type: reporter
  uart_id: uart_bus

text_sensor:
  - platform: template
    name: "Last Detected MAC"
    id: last_mac

sensor:
  - platform: template
    name: "Last Device RSSI"
    id: last_rssi
    unit_of_measurement: dBm
    accuracy_decimals: 0

  - platform: template
    name: "Devices In Last Scan"
    id: device_count
    accuracy_decimals: 0

logger: