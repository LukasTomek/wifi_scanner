esphome:
  name: wifi-reporter
  platform: ESP32
  board: esp32dev

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
mqtt:
  broker: !secret mqtt_broker

uart:
  id: uart_bus
  tx_pin: GPIO16
  rx_pin: GPIO17
  baud_rate: 115200

external_components:
  - source:
      type: local
      path: components

wifi_scanner:
  type: reporter
  id: reporter
  uart_id: uart_bus

# OTA switch exposed to HA
switch:
  - platform: template
    name: "Scanner OTA Update"
    id: scanner_ota_switch
    turn_on_action:
      - lambda: "id(reporter).request_ota();"
    turn_off_action:
      - lambda: "id(reporter).cancel_ota();"
    # Auto turn off when scanner reports done
    optimistic: false

# OTA status sensor in HA
text_sensor:
  - platform: template
    name: "Scanner OTA Status"
    id: ota_status

  - platform: template
    name: "Last Detected MAC"
    id: last_mac

sensor:
  - platform: template
    name: "Devices In Last Scan"
    id: device_count
    accuracy_decimals: 0

logger: