esphome:
  name: wifi-scanner
  platform: ESP32
  board: esp32dev

# ESPHome manages OTA and WiFi natively
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:                    # optional but handy for OTA
    static_ip: 192.168.1.50
    gateway: 192.168.1.1
    subnet: 255.255.255.0

ota:
  password: !secret ota_password

uart:
  id: uart_bus
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 115200

external_components:
  - source:
      type: local
      path: components

wifi_scanner:
  type: scanner
  uart_id: uart_bus
  report_interval: 30s
  rssi_threshold: -85

logger: