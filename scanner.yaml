esphome:
  name: wifi-scanner
  platform: ESP32
  board: esp32dev

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

ota:
  password: !secret ota_password

api:

uart:
  id: uart_bus
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 115200

external_components:
  - source:
      type: local
      path: components

wifi_scanner:
  type: scanner
  uart_id: uart_bus
  report_interval: 30s
  rssi_threshold: -85

logger: